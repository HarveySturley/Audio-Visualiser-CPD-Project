<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Visualiser</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header class="app-header">
      <div>
        <h1>Real-Time Audio Visualiser</h1>
        <p class="subtitle">Live FFT frequency analysis in the browser</p>
      </div>
      <span id="fps" class="fps-badge" aria-live="polite">— FPS</span>
    </header>

    <section class="controls">
      <button id="startBtn" type="button" class="primary">Start microphone</button>
      <button id="stopBtn" type="button" disabled>Stop</button>
      <p id="status" class="status">Click "Start microphone" to begin.</p>
    </section>

    <section class="visualiser">
      <canvas id="visualiserCanvas" width="900" height="320"></canvas>
    </section>

    <section class="settings">
      <label class="setting">
        <span class="setting-label">Visualisation</span>
        <select id="visSelect">
          <option value="frequency" selected>Frequency bars (log)</option>
          <option value="circular">Circular spectrum</option>
          <option value="waveform">Waveform</option>
        </select>
      </label>

      <label class="setting">
        <span class="setting-label">FFT size</span>
        <select id="fftSelect">
          <option value="256">256 — fast, coarse</option>
          <option value="1024">1024</option>
          <option value="2048" selected>2048 — balanced</option>
          <option value="8192">8192 — fine, slow</option>
        </select>
      </label>

      <label class="setting">
        <span class="setting-label">Smoothing <span id="smoothingValue">0.80</span></span>
        <input id="smoothingSlider" type="range" min="0" max="0.95" step="0.05" value="0.8" />
      </label>
    </section>

    <footer class="app-footer">
      <p>COMP4060 CPD Project — Harvey Sturley</p>
    </footer>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
