<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Visualiser — Week 2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header>
      <h1>Real-Time Audio Visualiser</h1>
      <p class="subtitle">Week 2 — FFT frequency analysis</p>
    </header>

    <section class="controls">
      <button id="startBtn" type="button">Start microphone</button>
      <button id="stopBtn" type="button" disabled>Stop</button>
      <p id="status" class="status">Click "Start microphone" to begin.</p>
    </section>

    <section class="settings">
      <label>
        Visualisation
        <select id="visSelect">
          <option value="frequency" selected>Frequency bars</option>
          <option value="waveform">Waveform</option>
        </select>
      </label>

      <label>
        FFT size
        <select id="fftSelect">
          <option value="256">256 (fast, coarse)</option>
          <option value="1024">1024</option>
          <option value="2048" selected>2048 (balanced)</option>
          <option value="8192">8192 (fine, slow)</option>
        </select>
      </label>

      <label>
        Smoothing
        <input id="smoothingSlider" type="range" min="0" max="0.95" step="0.05" value="0.8" />
        <span id="smoothingValue">0.80</span>
      </label>
    </section>

    <section class="visualiser">
      <canvas id="visualiserCanvas" width="900" height="300"></canvas>
    </section>

    <footer>
      <p>COMP4060 CPD Project — Harvey Sturley</p>
    </footer>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
